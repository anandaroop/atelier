<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atelier</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="preload"
      href="https://webfonts.artsy.net/ll-unica77_regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="https://webfonts.artsy.net/ll-unica77_medium.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="https://webfonts.artsy.net/ll-unica77.css" />
  </head>
  <body>
    <!--
      Drag-and-drop and click-anywhere are pointer-only. This button is the
      keyboard/screen-reader path to the same file picker — visually hidden
      until focused (classic skip-link pattern) so it doesn't disturb the
      hero for mouse users, but it's still reachable via Tab and announced
      by assistive tech regardless of visibility.
    -->
    <button id="browse-trigger" class="browse-trigger" type="button">Choose a zip file</button>

    <div class="branding">
      <div class="title">The Atelier</div>
      <div id="click-target" class="click-target">
        <div class="tagline">A place to hang your html sketches. Drop a zip, get a live site.</div>
        <div id="status" class="status" aria-live="polite" hidden></div>
      </div>
    </div>

    <input id="file-input" type="file" accept=".zip,application/zip" hidden />

    <script src="./app.js" defer></script>
  </body>
</html>
