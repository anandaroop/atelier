---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ project_name }}-web
  namespace: default
  labels:
    app: {{ project_name }}
    component: web
    layer: application
    app.kubernetes.io/version: production
spec:
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app: {{ project_name }}
      component: web
      layer: application
  template:
    metadata:
      labels:
        app: {{ project_name }}
        component: web
        layer: application
        app.kubernetes.io/version: production
      name: {{ project_name }}-web
    spec:
      initContainers:
      - name: setenv
        image: 585031190124.dkr.ecr.us-east-1.amazonaws.com/fortress:production
        imagePullPolicy: Always
        command:
        - python
        - src/load/load.py
        - kubernetes
        - production
        - atelier
        envFrom:
        - configMapRef:
            name: secrets-config
        volumeMounts:
        - name: secrets
          mountPath: /secrets
      containers:
      - name: {{ project_name }}-web
        env:
        - name: PORT
          value: "8080"
        - name: NODE_ENV
          value: production
        - name: DATADOG_TRACE_AGENT_HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: DD_VERSION
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['app.kubernetes.io/version']
        - name: NODE_OPTIONS
          value: "--max_old_space_size=256"
        envFrom:
        - configMapRef:
            name: secrets-config
        - configMapRef:
            name: {{ project_name }}-environment
        volumeMounts:
        - name: secrets
          mountPath: /secrets
          readOnly: true
        image: {{ project_repo }}:production
        imagePullPolicy: Always
        ports:
        # k8s limits a port name to 15 characters
        - name: {{ project_name }}-http
          containerPort: 8080
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            memory: 1Gi
        readinessProbe:
          httpGet:
            port: {{ project_name }}-http
            path: /health/ping
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
        - name: ndots
          value: "1"
      serviceAccountName: atelier
      tolerations: # if ok to run on Spot instances
      - key: reserved
        operator: Equal
        value: spot
        effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: tier
                operator: In
                values:
                - foreground
                - foreground-spot # if ok to run on Spot instances
          preferredDuringSchedulingIgnoredDuringExecution: # if ok to run on Spot instances
          - weight: 100
            preference:
              matchExpressions:
              - key: tier
                operator: In
                values:
                - foreground-spot
      volumes:
      - name: secrets
        emptyDir: {}

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ project_name }}-web
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ project_name }}-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: {{ project_name }}
    component: web
    layer: application
  name: {{ project_name }}-web-internal
  namespace: default
spec:
  ports:
  - port: 8080
    protocol: TCP
    name: http
    targetPort: {{ project_name }}-http
  selector:
    app: {{ project_name }}
    layer: application
    component: web
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ project_name }}
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: "{{ externalIngressAllowSourceIP|join(',') }}"
spec:
  ingressClassName: external-nginx
  rules:
  - host: {{ project_name }}.artsy.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ project_name }}-web-internal
            port:
              name: http

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ project_name }}-cron-example
spec:
  schedule: "11 11 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0 # do not retry if pod fails.
      template:
        metadata:
          annotations:
            "cluster-autoscaler.kubernetes.io/safe-to-evict": "false"
        spec:
          initContainers:
          - name: setenv
            image: 585031190124.dkr.ecr.us-east-1.amazonaws.com/fortress:production
            imagePullPolicy: Always
            command:
            - python
            - src/load/load.py
            - kubernetes
            - production
            - atelier
            envFrom:
            - configMapRef:
                name: secrets-config
            volumeMounts:
            - name: secrets
              mountPath: /secrets
          containers:
          - name: {{ project_name }}-cron-example
            image: {{ project_repo }}:production
            imagePullPolicy: Always
            envFrom:
            - configMapRef:
                name: secrets-config
            - configMapRef:
                name: {{ project_name }}-environment
            volumeMounts:
            - name: secrets
              mountPath: /secrets
              readOnly: true
            args: ["echo", "i am just an example"]
          restartPolicy: Never
          serviceAccountName: atelier
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: tier
                    operator: In
                    values:
                    - background
          volumes:
          - name: secrets
            emptyDir: {}
